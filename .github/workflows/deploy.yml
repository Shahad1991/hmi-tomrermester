name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      # Add retry logic to npm install
      - name: Install dependencies with retry
        run: |
          for i in 1 2 3; do
            npm install && break
            sleep 10
          done

      - name: Build Next.js app
        run: npm run build

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.hmitomrermester }}
        run: npx vercel --prod --yes --token $VERCEL_TOKEN